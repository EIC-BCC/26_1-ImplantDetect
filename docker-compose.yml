services:
  postgres:
    image: postgres:17-alpine
    container_name: implantdetect-database
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-implantdetect}
      POSTGRES_USER: ${POSTGRES_USER:-implantdetect_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - implantdetect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-implantdetect_user} -d ${POSTGRES_DB:-implantdetect}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.3.0-management
    container_name: implantdetect-rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-implantdetect}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD obrigatório}
    networks:
      - implantdetect-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    image: implantdetect-api
    build:
      context: .
      dockerfile: implantdetect-backend/Dockerfile
    container_name: implantdetect-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL obrigatório}
      - RABBITMQ_URL=${RABBITMQ_URL:?RABBITMQ_URL obrigatório}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY obrigatório}
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - implantdetect-network
    volumes:
      - uploads_data:/app/uploads
      - ./implantdetect-backend/logs:/app/logs:rw

  prediction:
    image: implantdetect-prediction
    build:
      context: .
      dockerfile: implantdetect-prediction/Dockerfile
    container_name: implantdetect-prediction
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL obrigatório}
      - RABBITMQ_URL=${RABBITMQ_URL:?RABBITMQ_URL obrigatório}
      - UPLOAD_FILE_PATH=/app/uploads
      - YOLO_MODEL_PATH=/app/yolo_weights/best.pt
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - implantdetect-network
    volumes:
      - uploads_data:/app/uploads
      - ./implantdetect-training/models/checkpoints/pipeline_completo_clahe_v8_small_200e/weights:/app/yolo_weights:ro
      - prediction_logs:/app/logs

  frontend:
    image: implantdetect-frontend
    build:
      context: implantdetect-frontend
      dockerfile: Dockerfile
    container_name: implantdetect-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - implantdetect-network

volumes:
  postgres_data:
  uploads_data:
  prediction_logs:

networks:
  implantdetect-network:
    driver: bridge
