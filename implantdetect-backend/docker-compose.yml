services:
  # Serviço PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: implantdetect-database
    environment:
      POSTGRES_DB: implantdetect
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - implantdetect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d implantdetect"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: implantdetect-api
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: implantdetect-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://root:password@postgres:5432/implantdetect
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - implantdetect-network
    volumes:
      - ./uploads:/app/uploads:rw
      - ./logs:/app/logs:rw
      # Alternativa: usar volumes nomeados (descomente se preferir)
      # - uploads_data:/app/uploads
      # - logs_data:/app/logs

volumes:
  postgres_data:
  # Descomente se quiser usar volumes nomeados ao invés de bind mounts
  # uploads_data:
  # logs_data:

networks:
  implantdetect-network:
    driver: bridge